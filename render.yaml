# Render blueprint — deploy from repo root via Render Dashboard → New → Blueprint
# Or: New Web Service → connect GitHub → set Root Directory to "backend"

services:
  - type: web
    name: rozy-api
    runtime: go
    rootDir: backend
    plan: free
    buildCommand: go build -ldflags="-s -w" -o server ./cmd/api
    startCommand: ./server
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: AUTO_MIGRATE
        value: "true"
      - key: SMS_PROVIDER
        value: console
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MAPBOX_ACCESS_TOKEN
        sync: false
